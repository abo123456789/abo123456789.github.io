<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 格式化工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .toolbar {
            background: #f8f9fa;
            padding: 20px 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 2px solid #e0e0e0;
        }

        .toolbar-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toolbar-label {
            font-weight: bold;
            color: #555;
            font-size: 0.95rem;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .indent-select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
        }

        .indent-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 600px;
        }

        .editor-panel {
            display: flex;
            flex-direction: column;
            border-right: 2px solid #e0e0e0;
        }

        .editor-panel:last-child {
            border-right: none;
        }

        .panel-header {
            background: linear-gradient(145deg, #f8f9fa, #e9ecef);
            padding: 15px 20px;
            font-weight: bold;
            color: #2c3e50;
            font-size: 1.1rem;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header .icon {
            font-size: 1.3rem;
        }

        .editor {
            flex: 1;
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
            border: none;
            resize: none;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
        }

        .editor:focus {
            outline: none;
        }

        .output {
            flex: 1;
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
            overflow: auto;
            background: #1e1e1e;
            color: #d4d4d4;
            white-space: pre;
        }

        .status-bar {
            background: #2c3e50;
            color: white;
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-icon {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #43e97b;
        }

        .status-icon.error {
            background: #f5576c;
        }

        .error-message {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px 20px;
            margin: 20px;
            border-radius: 8px;
            color: #856404;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* JSON 语法高亮 */
        .json-key {
            color: #9cdcfe;
        }

        .json-string {
            color: #ce9178;
        }

        .json-number {
            color: #b5cea8;
        }

        .json-boolean {
            color: #569cd6;
        }

        .json-null {
            color: #569cd6;
        }

        .stats-panel {
            background: #f8f9fa;
            padding: 20px 30px;
            border-top: 2px solid #e0e0e0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .stat-card {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        @media (max-width: 1024px) {
            .editor-container {
                grid-template-columns: 1fr;
            }

            .editor-panel {
                border-right: none;
                border-bottom: 2px solid #e0e0e0;
            }

            .editor-panel:last-child {
                border-bottom: none;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .toolbar {
                padding: 15px 20px;
            }

            .stats-panel {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 JSON 格式化工具</h1>
            <p>快速格式化、压缩、验证和美化您的 JSON 数据</p>
        </div>

        <div class="toolbar">
            <div class="toolbar-group">
                <button class="btn btn-primary" onclick="formatJSON()">
                    ✨ 手动格式化
                </button>
                <button class="btn btn-warning" onclick="compressJSON()">
                    🗜️ 压缩
                </button>
                <button class="btn btn-success" onclick="validateJSON()">
                    ✅ 验证
                </button>
            </div>

            <div class="toolbar-group">
                <span class="toolbar-label">缩进:</span>
                <select class="indent-select" id="indentSize" onchange="autoFormatJSON()">
                    <option value="2" selected>2 空格</option>
                    <option value="4">4 空格</option>
                    <option value="tab">Tab</option>
                </select>
            </div>

            <div class="toolbar-group">
                <button class="btn btn-secondary" onclick="copyOutput()">
                    📋 复制结果
                </button>
                <button class="btn btn-danger" onclick="clearAll()">
                    🗑️ 清空
                </button>
            </div>

            <div class="toolbar-group" style="margin-left: auto;">
                <span style="color: #43e97b; font-weight: bold; font-size: 0.9rem;">
                    ⚡ 实时格式化已启用
                </span>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="editor-container">
            <div class="editor-panel">
                <div class="panel-header">
                    <span><span class="icon">📝</span> 输入 JSON</span>
                    <span id="inputLength">0 字符</span>
                </div>
                <textarea class="editor" id="inputJSON" placeholder='请输入 JSON 数据，例如：{"name":"张三","age":25}'></textarea>
            </div>

            <div class="editor-panel">
                <div class="panel-header">
                    <span><span class="icon">✨</span> 格式化输出</span>
                    <span id="outputLength">0 字符</span>
                </div>
                <div class="output" id="outputJSON">格式化后的 JSON 将显示在这里...</div>
            </div>
        </div>

        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-label">对象数量</div>
                <div class="stat-value" id="objectCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">数组数量</div>
                <div class="stat-value" id="arrayCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">键值对数量</div>
                <div class="stat-value" id="keyCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">最大深度</div>
                <div class="stat-value" id="maxDepth">0</div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-icon" id="statusIcon"></div>
                <span id="statusText">就绪</span>
            </div>
            <div class="status-item">
                <span id="timestamp"></span>
            </div>
        </div>
    </div>

    <script>
        const inputJSON = document.getElementById('inputJSON');
        const outputJSON = document.getElementById('outputJSON');
        const errorMessage = document.getElementById('errorMessage');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');

        let currentJSON = null;

        // 实时更新输入字符数和自动格式化
        let autoFormatTimer = null;
        inputJSON.addEventListener('input', () => {
            document.getElementById('inputLength').textContent = inputJSON.value.length + ' 字符';
            
            // 防抖：延迟500ms后自动格式化
            clearTimeout(autoFormatTimer);
            autoFormatTimer = setTimeout(() => {
                autoFormatJSON();
            }, 500);
        });

        // 自动格式化（静默模式，不显示错误提示）
        function autoFormatJSON() {
            try {
                const input = inputJSON.value.trim();
                if (!input) {
                    outputJSON.textContent = '格式化后的 JSON 将显示在这里...';
                    document.getElementById('outputLength').textContent = '0 字符';
                    resetStats();
                    updateStatus('success', '就绪');
                    hideError();
                    return;
                }

                // 解析 JSON
                currentJSON = JSON.parse(input);

                // 获取缩进设置
                const indentSize = document.getElementById('indentSize').value;
                const indent = indentSize === 'tab' ? '\t' : parseInt(indentSize);

                // 格式化
                const formatted = JSON.stringify(currentJSON, null, indent);

                // 语法高亮
                outputJSON.innerHTML = syntaxHighlight(formatted);

                // 更新统计
                updateStats(currentJSON);

                // 更新状态
                updateStatus('success', '实时格式化');
                hideError();

                // 更新输出长度
                document.getElementById('outputLength').textContent = formatted.length + ' 字符';

            } catch (error) {
                // 静默处理错误，不显示错误提示（避免输入过程中频繁提示）
                if (inputJSON.value.trim().length > 0) {
                    outputJSON.innerHTML = `<div style="color: #f5576c; font-size: 0.95rem; padding: 20px;">
                        <div style="opacity: 0.7;">⚠️ JSON 格式不完整或有错误</div>
                        <div style="font-size: 0.85rem; margin-top: 10px; opacity: 0.6;">${error.message}</div>
                    </div>`;
                    updateStatus('error', '格式错误');
                }
            }
        }

        // 格式化 JSON
        function formatJSON() {
            try {
                const input = inputJSON.value.trim();
                if (!input) {
                    showError('请输入 JSON 数据');
                    return;
                }

                // 解析 JSON
                currentJSON = JSON.parse(input);

                // 获取缩进设置
                const indentSize = document.getElementById('indentSize').value;
                const indent = indentSize === 'tab' ? '\t' : parseInt(indentSize);

                // 格式化
                const formatted = JSON.stringify(currentJSON, null, indent);

                // 语法高亮
                outputJSON.innerHTML = syntaxHighlight(formatted);

                // 更新统计
                updateStats(currentJSON);

                // 更新状态
                updateStatus('success', '格式化成功');
                hideError();

                // 更新输出长度
                document.getElementById('outputLength').textContent = formatted.length + ' 字符';

            } catch (error) {
                showError('JSON 格式错误: ' + error.message);
                updateStatus('error', 'JSON 格式错误');
                outputJSON.textContent = '';
            }
        }

        // 压缩 JSON
        function compressJSON() {
            try {
                const input = inputJSON.value.trim();
                if (!input) {
                    showError('请输入 JSON 数据');
                    return;
                }

                currentJSON = JSON.parse(input);
                const compressed = JSON.stringify(currentJSON);

                outputJSON.innerHTML = syntaxHighlight(compressed);
                updateStats(currentJSON);
                updateStatus('success', '压缩成功');
                hideError();

                document.getElementById('outputLength').textContent = compressed.length + ' 字符';

            } catch (error) {
                showError('JSON 格式错误: ' + error.message);
                updateStatus('error', 'JSON 格式错误');
            }
        }

        // 验证 JSON
        function validateJSON() {
            try {
                const input = inputJSON.value.trim();
                if (!input) {
                    showError('请输入 JSON 数据');
                    return;
                }

                currentJSON = JSON.parse(input);
                updateStatus('success', '✅ JSON 格式正确！');
                hideError();

                // 显示验证成功消息
                outputJSON.innerHTML = `<div style="color: #43e97b; font-size: 1.2rem; padding: 20px; text-align: center;">
                    <div style="font-size: 3rem; margin-bottom: 10px;">✅</div>
                    <div style="font-weight: bold; margin-bottom: 10px;">JSON 格式验证通过！</div>
                    <div style="font-size: 0.9rem; opacity: 0.8;">您的 JSON 数据格式正确，可以安全使用。</div>
                </div>`;

                updateStats(currentJSON);

            } catch (error) {
                showError('JSON 格式错误: ' + error.message);
                updateStatus('error', '❌ JSON 格式错误');
                outputJSON.innerHTML = `<div style="color: #f5576c; font-size: 1.2rem; padding: 20px; text-align: center;">
                    <div style="font-size: 3rem; margin-bottom: 10px;">❌</div>
                    <div style="font-weight: bold; margin-bottom: 10px;">JSON 格式验证失败！</div>
                    <div style="font-size: 0.9rem; opacity: 0.8;">${error.message}</div>
                </div>`;
            }
        }

        // 复制输出
        function copyOutput() {
            const output = outputJSON.textContent;
            if (!output || output === '格式化后的 JSON 将显示在这里...') {
                showError('没有可复制的内容');
                return;
            }

            navigator.clipboard.writeText(output).then(() => {
                updateStatus('success', '已复制到剪贴板');
                setTimeout(() => updateStatus('success', '就绪'), 2000);
            }).catch(() => {
                showError('复制失败，请手动复制');
            });
        }

        // 清空所有
        function clearAll() {
            inputJSON.value = '';
            outputJSON.textContent = '格式化后的 JSON 将显示在这里...';
            currentJSON = null;
            hideError();
            updateStatus('success', '已清空');
            document.getElementById('inputLength').textContent = '0 字符';
            document.getElementById('outputLength').textContent = '0 字符';
            resetStats();
        }

        // 语法高亮
        function syntaxHighlight(json) {
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        // 更新统计信息
        function updateStats(obj) {
            let objectCount = 0;
            let arrayCount = 0;
            let keyCount = 0;
            let maxDepth = 0;

            function analyze(data, depth = 0) {
                maxDepth = Math.max(maxDepth, depth);

                if (Array.isArray(data)) {
                    arrayCount++;
                    data.forEach(item => analyze(item, depth + 1));
                } else if (typeof data === 'object' && data !== null) {
                    objectCount++;
                    Object.keys(data).forEach(key => {
                        keyCount++;
                        analyze(data[key], depth + 1);
                    });
                }
            }

            analyze(obj);

            document.getElementById('objectCount').textContent = objectCount;
            document.getElementById('arrayCount').textContent = arrayCount;
            document.getElementById('keyCount').textContent = keyCount;
            document.getElementById('maxDepth').textContent = maxDepth;
        }

        // 重置统计
        function resetStats() {
            document.getElementById('objectCount').textContent = '0';
            document.getElementById('arrayCount').textContent = '0';
            document.getElementById('keyCount').textContent = '0';
            document.getElementById('maxDepth').textContent = '0';
        }

        // 显示错误
        function showError(message) {
            errorMessage.textContent = '⚠️ ' + message;
            errorMessage.classList.add('show');
        }

        // 隐藏错误
        function hideError() {
            errorMessage.classList.remove('show');
        }

        // 更新状态
        function updateStatus(type, message) {
            statusIcon.className = 'status-icon' + (type === 'error' ? ' error' : '');
            statusText.textContent = message;
            updateTimestamp();
        }

        // 更新时间戳
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('timestamp').textContent = 
                now.toLocaleTimeString('zh-CN', { hour12: false });
        }

        // 示例 JSON
        const exampleJSON = {
            "name": "张三",
            "age": 25,
            "email": "zhangsan@example.com",
            "address": {
                "city": "北京",
                "district": "朝阳区",
                "street": "建国路88号"
            },
            "hobbies": ["阅读", "旅游", "摄影"],
            "isActive": true,
            "balance": 1234.56
        };

        // 页面加载时显示示例
        window.addEventListener('load', () => {
            inputJSON.value = JSON.stringify(exampleJSON);
            document.getElementById('inputLength').textContent = inputJSON.value.length + ' 字符';
            autoFormatJSON(); // 使用自动格式化
            updateTimestamp();
        });

        // 支持拖拽文件
        inputJSON.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/json') {
                const reader = new FileReader();
                reader.onload = (event) => {
                    inputJSON.value = event.target.result;
                    document.getElementById('inputLength').textContent = inputJSON.value.length + ' 字符';
                    autoFormatJSON(); // 使用自动格式化
                };
                reader.readAsText(file);
            }
        });

        inputJSON.addEventListener('dragover', (e) => {
            e.preventDefault();
        });
    </script>
</body>
</html>
