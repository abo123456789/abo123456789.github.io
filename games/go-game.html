<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋对弈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        .board-wrapper {
            background: linear-gradient(145deg, #d4a574, #c89858);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6),
                        inset 0 0 40px rgba(0, 0, 0, 0.15);
            position: relative;
        }

        .board-wrapper::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 4px solid rgba(139, 69, 19, 0.3);
            border-radius: 20px;
            pointer-events: none;
        }

        .board-wrapper::after {
            content: '围棋';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #c9302c 0%, #d4145a 100%);
            color: white;
            padding: 8px 25px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(201, 48, 44, 0.4);
        }

        #goBoard {
            background: linear-gradient(145deg, #daa520, #b8860b);
            border-radius: 15px;
            box-shadow: inset 0 8px 20px rgba(0, 0, 0, 0.3);
            cursor: crosshair;
            display: block;
        }

        .control-panel {
            background: linear-gradient(145deg, #ffffff, #f5f5f5);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
            min-width: 320px;
            max-width: 400px;
        }

        .game-title {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #c9302c 0%, #d4145a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .player-section {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
            background: #f8f9fa;
            border: 3px solid transparent;
        }

        .player-section.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #ffd700;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            transform: scale(1.03);
        }

        .stone-display {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
        }

        .stone-display.black {
            background: radial-gradient(circle at 35% 35%, #4a4a4a, #000000);
        }

        .stone-display.white {
            background: radial-gradient(circle at 35% 35%, #ffffff, #d0d0d0);
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .player-captures {
            font-size: 0.95rem;
            opacity: 0.8;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 18px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-btn {
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .game-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .game-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-restart {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-pass {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-undo {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-score {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        .message-box {
            margin-top: 20px;
            padding: 18px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.05rem;
            display: none;
            animation: slideIn 0.5s ease-out;
        }

        .message-box.show {
            display: block;
        }

        .message-box.info {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            color: #1565c0;
        }

        .message-box.success {
            background: linear-gradient(135deg, #c8e6c9, #a5d6a7);
            color: #2e7d32;
        }

        .message-box.warning {
            background: linear-gradient(135deg, #fff9c4, #fff59d);
            color: #f57f17;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .rules-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #555;
            line-height: 1.6;
        }

        .rules-section h4 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .rules-section ul {
            margin-left: 20px;
        }

        .rules-section li {
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
            }

            .board-wrapper {
                padding: 25px;
            }

            #goBoard {
                width: 100% !important;
                height: auto !important;
            }

            .control-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="board-wrapper">
            <canvas id="goBoard" width="570" height="570"></canvas>
        </div>

        <div class="control-panel">
            <h1 class="game-title">⚫⚪ 围棋</h1>

            <div class="player-section active" id="blackPlayer">
                <div class="stone-display black"></div>
                <div class="player-info">
                    <div class="player-name">黑方</div>
                    <div class="player-captures">提子: <span id="blackCaptures">0</span></div>
                </div>
            </div>

            <div class="player-section" id="whitePlayer">
                <div class="stone-display white"></div>
                <div class="player-info">
                    <div class="player-name">白方</div>
                    <div class="player-captures">提子: <span id="whiteCaptures">0</span></div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">手数</div>
                    <div class="stat-value" id="moveCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">连续虚手</div>
                    <div class="stat-value" id="passCount">0</div>
                </div>
            </div>

            <div class="button-group">
                <button class="game-btn btn-restart" onclick="restartGame()">
                    🔄 重新开始
                </button>
                <button class="game-btn btn-pass" onclick="pass()">
                    ⏭️ 虚手（Pass）
                </button>
                <button class="game-btn btn-undo" onclick="undoMove()" id="undoBtn">
                    ↩️ 悔棋
                </button>
                <button class="game-btn btn-score" onclick="calculateScore()">
                    🏆 计算胜负
                </button>
            </div>

            <div class="message-box" id="messageBox"></div>

            <div class="rules-section">
                <h4>📖 游戏规则</h4>
                <ul>
                    <li>黑方先行，双方轮流落子</li>
                    <li>气尽的棋子会被提掉</li>
                    <li>禁止全局同形（打劫需隔手）</li>
                    <li>双方连续虚手则游戏结束</li>
                    <li>点击"计算胜负"查看结果</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('goBoard');
        const ctx = canvas.getContext('2d');
        const BOARD_SIZE = 19;
        const CELL_SIZE = 30;
        const STONE_RADIUS = 13;
        const MARGIN = CELL_SIZE;

        let board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
        let currentPlayer = 1; // 1: 黑, 2: 白
        let moveHistory = [];
        let moveCount = 0;
        let blackCaptures = 0;
        let whiteCaptures = 0;
        let passCount = 0;
        let lastBoardState = null;

        // 绘制棋盘
        function drawBoard() {
            // 背景
            ctx.fillStyle = '#daa520';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 网格线
            ctx.strokeStyle = '#8b4513';
            ctx.lineWidth = 1.5;

            for (let i = 0; i < BOARD_SIZE; i++) {
                // 垂直线
                ctx.beginPath();
                ctx.moveTo(MARGIN + i * CELL_SIZE, MARGIN);
                ctx.lineTo(MARGIN + i * CELL_SIZE, MARGIN + (BOARD_SIZE - 1) * CELL_SIZE);
                ctx.stroke();

                // 水平线
                ctx.beginPath();
                ctx.moveTo(MARGIN, MARGIN + i * CELL_SIZE);
                ctx.lineTo(MARGIN + (BOARD_SIZE - 1) * CELL_SIZE, MARGIN + i * CELL_SIZE);
                ctx.stroke();
            }

            // 星位
            const starPoints = [
                [3, 3], [3, 9], [3, 15],
                [9, 3], [9, 9], [9, 15],
                [15, 3], [15, 9], [15, 15]
            ];

            ctx.fillStyle = '#8b4513';
            starPoints.forEach(([x, y]) => {
                ctx.beginPath();
                ctx.arc(MARGIN + x * CELL_SIZE, MARGIN + y * CELL_SIZE, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // 绘制棋子
        function drawStone(x, y, player, isLast = false) {
            const centerX = MARGIN + x * CELL_SIZE;
            const centerY = MARGIN + y * CELL_SIZE;

            // 阴影
            ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            if (player === 1) {
                // 黑子
                const gradient = ctx.createRadialGradient(
                    centerX - STONE_RADIUS * 0.3, centerY - STONE_RADIUS * 0.3, 0,
                    centerX, centerY, STONE_RADIUS
                );
                gradient.addColorStop(0, '#4a4a4a');
                gradient.addColorStop(1, '#000000');
                ctx.fillStyle = gradient;
            } else {
                // 白子
                const gradient = ctx.createRadialGradient(
                    centerX - STONE_RADIUS * 0.3, centerY - STONE_RADIUS * 0.3, 0,
                    centerX, centerY, STONE_RADIUS
                );
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(1, '#d0d0d0');
                ctx.fillStyle = gradient;
            }

            ctx.beginPath();
            ctx.arc(centerX, centerY, STONE_RADIUS, 0, Math.PI * 2);
            ctx.fill();

            // 重置阴影
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;

            // 最后一手标记
            if (isLast) {
                ctx.fillStyle = player === 1 ? '#ffffff' : '#ff0000';
                ctx.beginPath();
                ctx.arc(centerX, centerY, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 重绘棋盘
        function redraw() {
            drawBoard();
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] !== 0) {
                        const isLast = moveHistory.length > 0 && 
                                      moveHistory[moveHistory.length - 1].x === i && 
                                      moveHistory[moveHistory.length - 1].y === j;
                        drawStone(i, j, board[i][j], isLast);
                    }
                }
            }
        }

        // 获取棋子的气
        function getLiberties(x, y, visited = new Set()) {
            const key = `${x},${y}`;
            if (visited.has(key)) return 0;
            visited.add(key);

            const player = board[x][y];
            if (player === 0) return 0;

            let liberties = 0;
            const directions = [[0, 1], [1, 0], [0, -1], [-1, 0]];

            for (let [dx, dy] of directions) {
                const nx = x + dx;
                const ny = y + dy;
                if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                    if (board[nx][ny] === 0) {
                        liberties++;
                    } else if (board[nx][ny] === player) {
                        liberties += getLiberties(nx, ny, visited);
                    }
                }
            }

            return liberties;
        }

        // 移除死子
        function removeDeadStones(x, y, player) {
            const opponent = player === 1 ? 2 : 1;
            const directions = [[0, 1], [1, 0], [0, -1], [-1, 0]];
            let captured = 0;

            for (let [dx, dy] of directions) {
                const nx = x + dx;
                const ny = y + dy;
                if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                    if (board[nx][ny] === opponent && getLiberties(nx, ny) === 0) {
                        captured += removeGroup(nx, ny);
                    }
                }
            }

            return captured;
        }

        // 移除一组棋子
        function removeGroup(x, y) {
            const player = board[x][y];
            if (player === 0) return 0;

            board[x][y] = 0;
            let count = 1;

            const directions = [[0, 1], [1, 0], [0, -1], [-1, 0]];
            for (let [dx, dy] of directions) {
                const nx = x + dx;
                const ny = y + dy;
                if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                    if (board[nx][ny] === player) {
                        count += removeGroup(nx, ny);
                    }
                }
            }

            return count;
        }

        // 复制棋盘状态
        function copyBoard() {
            return board.map(row => [...row]);
        }

        // 比较棋盘状态
        function boardsEqual(board1, board2) {
            if (!board1 || !board2) return false;
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board1[i][j] !== board2[i][j]) return false;
                }
            }
            return true;
        }

        // 处理点击
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            const x = Math.round((clickX - MARGIN) / CELL_SIZE);
            const y = Math.round((clickY - MARGIN) / CELL_SIZE);

            if (x >= 0 && x < BOARD_SIZE && y >= 0 && y < BOARD_SIZE && board[x][y] === 0) {
                // 保存当前状态
                const previousBoard = copyBoard();

                // 放置棋子
                board[x][y] = currentPlayer;

                // 移除对方死子
                const captured = removeDeadStones(x, y, currentPlayer);

                // 检查自杀手（自己没气）
                if (captured === 0 && getLiberties(x, y) === 0) {
                    board = previousBoard;
                    showMessage('不能下自杀手！', 'warning');
                    return;
                }

                // 检查打劫（全局同形）
                if (lastBoardState && boardsEqual(board, lastBoardState)) {
                    board = previousBoard;
                    showMessage('禁止全局同形（打劫需隔手）！', 'warning');
                    return;
                }

                // 记录历史
                moveHistory.push({
                    x, y,
                    player: currentPlayer,
                    captured,
                    previousBoard: previousBoard
                });

                // 更新提子数
                if (currentPlayer === 1) {
                    blackCaptures += captured;
                    document.getElementById('blackCaptures').textContent = blackCaptures;
                } else {
                    whiteCaptures += captured;
                    document.getElementById('whiteCaptures').textContent = whiteCaptures;
                }

                // 更新手数
                moveCount++;
                document.getElementById('moveCount').textContent = moveCount;

                // 保存上一步棋盘状态
                lastBoardState = previousBoard;

                // 重置虚手计数
                passCount = 0;
                document.getElementById('passCount').textContent = passCount;

                // 切换玩家
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                updatePlayerDisplay();

                // 启用悔棋按钮
                document.getElementById('undoBtn').disabled = false;

                redraw();
            }
        });

        // 虚手
        function pass() {
            passCount++;
            document.getElementById('passCount').textContent = passCount;

            if (passCount >= 2) {
                showMessage('双方连续虚手，游戏结束！点击"计算胜负"查看结果。', 'success');
                return;
            }

            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updatePlayerDisplay();
            showMessage(`${currentPlayer === 1 ? '黑方' : '白方'}选择虚手`, 'info');
        }

        // 悔棋
        function undoMove() {
            if (moveHistory.length === 0) return;

            const lastMove = moveHistory.pop();
            board = lastMove.previousBoard;

            // 恢复提子数
            if (lastMove.player === 1) {
                blackCaptures -= lastMove.captured;
                document.getElementById('blackCaptures').textContent = blackCaptures;
            } else {
                whiteCaptures -= lastMove.captured;
                document.getElementById('whiteCaptures').textContent = whiteCaptures;
            }

            // 恢复手数
            moveCount--;
            document.getElementById('moveCount').textContent = moveCount;

            // 恢复玩家
            currentPlayer = lastMove.player;
            updatePlayerDisplay();

            // 恢复上一步棋盘状态
            if (moveHistory.length > 0) {
                lastBoardState = moveHistory[moveHistory.length - 1].previousBoard;
            } else {
                lastBoardState = null;
            }

            if (moveHistory.length === 0) {
                document.getElementById('undoBtn').disabled = true;
            }

            redraw();
        }

        // 更新玩家显示
        function updatePlayerDisplay() {
            const blackPlayer = document.getElementById('blackPlayer');
            const whitePlayer = document.getElementById('whitePlayer');

            if (currentPlayer === 1) {
                blackPlayer.classList.add('active');
                whitePlayer.classList.remove('active');
            } else {
                blackPlayer.classList.remove('active');
                whitePlayer.classList.add('active');
            }
        }

        // 计算胜负（简化版）
        function calculateScore() {
            let blackTerritory = 0;
            let whiteTerritory = 0;

            // 简单计算：统计棋子数量
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] === 1) blackTerritory++;
                    if (board[i][j] === 2) whiteTerritory++;
                }
            }

            // 加上提子
            blackTerritory += blackCaptures;
            whiteTerritory += whiteCaptures;

            // 白方贴7.5目
            whiteTerritory += 7.5;

            const winner = blackTerritory > whiteTerritory ? '黑方' : '白方';
            const diff = Math.abs(blackTerritory - whiteTerritory).toFixed(1);

            showMessage(
                `黑方: ${blackTerritory}目 | 白方: ${whiteTerritory.toFixed(1)}目\n${winner}胜 ${diff}目`,
                'success'
            );
        }

        // 显示消息
        function showMessage(text, type = 'info') {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = text;
            messageBox.className = `message-box show ${type}`;
        }

        // 重新开始
        function restartGame() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
            currentPlayer = 1;
            moveHistory = [];
            moveCount = 0;
            blackCaptures = 0;
            whiteCaptures = 0;
            passCount = 0;
            lastBoardState = null;

            document.getElementById('moveCount').textContent = moveCount;
            document.getElementById('passCount').textContent = passCount;
            document.getElementById('blackCaptures').textContent = blackCaptures;
            document.getElementById('whiteCaptures').textContent = whiteCaptures;
            document.getElementById('undoBtn').disabled = true;
            document.getElementById('messageBox').className = 'message-box';

            updatePlayerDisplay();
            redraw();
        }

        // 初始化
        drawBoard();
        updatePlayerDisplay();
        document.getElementById('undoBtn').disabled = true;
    </script>
</body>
</html>
